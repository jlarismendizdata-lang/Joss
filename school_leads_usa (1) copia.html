<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infrastructure | School Leads USA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Palette - Vercel/Linear Executive Minimal */
      --canvas: #FAFAFA;
      --surface: #FFFFFF;
      --surface-hover: #F3F4F6;
      --surface-active: #E5E7EB;
      --border-subtle: #E5E7EB;
      --border-strong: #D1D5DB;
      --text-main: #111827;
      --text-muted: #6B7280;
      --text-faint: #9CA3AF;
      --accent-primary: #111827;
      --accent-hover: #374151;
      --indicator-green: #10B981;
      --indicator-green-bg: #D1FAE5;
      --indicator-blue: #3B82F6;
      --indicator-blue-bg: #DBEAFE;
      --indicator-amber: #F59E0B;
      --indicator-amber-bg: #FEF3C7;

      /* Geometry */
      --sidebar-width: 380px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      
      /* Shadows */
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-dropdown: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-modal: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0,0,0,0.05);
      
      /* Animation */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in-out: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    html, body {
      height: 100%;
      background: var(--canvas);
      color: var(--text-main);
      font-family: var(--font-sans);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow: hidden;
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Layout */
    #app-mount {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Top Navigation */
    .topbar {
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      z-index: 10;
    }
    
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.02em;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface-hover);
      padding: 4px 10px;
      border-radius: 100px;
    }

    .status-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--indicator-green);
      position: relative;
    }
    .status-dot::after {
      content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: inherit; border-radius: 50%; opacity: 0.4; animation: pulse 2s infinite;
    }
    @keyframes pulse { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(2.5); opacity: 0; } }

    /* Main Workspace */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Data View (Left) */
    .datagrid-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border-subtle);
      min-width: 0;
    }

    /* Filters & Controls */
    .toolbar {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
    }

    .search-input {
      position: relative;
      width: 280px;
    }

    .search-input input {
      width: 100%;
      padding: 8px 12px 8px 32px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      font-family: inherit;
      font-size: 13px;
      color: var(--text-main);
      transition: all 0.2s var(--ease-out);
      outline: none;
      box-shadow: var(--shadow-sm);
    }

    .search-input input:focus {
      border-color: var(--text-muted);
      box-shadow: 0 0 0 1px var(--text-muted);
    }

    .search-input svg {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      pointer-events: none;
    }

    .segment-controls {
      display: flex;
      background: var(--surface-hover);
      padding: 3px;
      border-radius: var(--radius-md);
    }

    .segment-btn {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
    }

    .segment-btn.active {
      background: var(--surface);
      color: var(--text-main);
      box-shadow: var(--shadow-sm);
    }

    /* Table Architecture */
    .table-wrapper {
      flex: 1;
      overflow-y: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    thead th {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      padding: 12px 24px;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-subtle);
      z-index: 5;
    }

    tbody tr {
      border-bottom: 1px solid var(--border-subtle);
      transition: background 0.1s var(--ease-out);
      group: row;
    }

    tbody tr:hover {
      background: var(--surface-hover);
    }

    td {
      padding: 16px 24px;
      vertical-align: middle;
    }

    .entity-primary { font-weight: 500; color: var(--text-main); font-size: 14px; }
    .entity-secondary { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    
    .data-mono {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text-main);
    }

    .data-mono.empty { color: var(--text-faint); }

    .badge-tier {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
      background: var(--surface-hover);
      color: var(--text-muted);
      border: 1px solid var(--border-subtle);
    }

    /* Allocation Actions */
    .action-cell { text-align: right; width: 140px; }
    
    .btn-allocate {
      opacity: 0;
      transform: translateX(4px);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      background: var(--surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      box-shadow: var(--shadow-sm);
    }

    tbody tr:hover .btn-allocate { opacity: 1; transform: translateX(0); }
    .btn-allocate:hover { border-color: var(--text-muted); background: var(--surface-hover); }

    .allocation-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      animation: fadeIn 0.2s var(--ease-out);
    }

    .qty-input {
      width: 64px;
      padding: 4px 8px;
      font-family: var(--font-mono);
      font-size: 12px;
      text-align: right;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.2s;
    }
    .qty-input:focus { border-color: var(--text-main); }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px; height: 24px;
      border: none;
      background: transparent;
      color: var(--text-muted);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-icon:hover { background: var(--surface-active); color: var(--text-main); }

    /* Operational Sidebar (Right) */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--canvas);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .sidebar-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    
    .sidebar-subtitle {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-main);
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Intelligence Module */
    .intelligence-card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }

    .intel-header {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    .intel-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .intel-item {
      display: flex;
      gap: 10px;
      font-size: 13px;
      line-height: 1.4;
      color: var(--text-muted);
    }

    .intel-icon {
      flex-shrink: 0;
      margin-top: 2px;
    }
    .intel-icon.positive { color: var(--indicator-green); }
    .intel-icon.warning { color: var(--indicator-amber); }
    .intel-icon.info { color: var(--indicator-blue); }

    /* Allocation List */
    .allocation-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alloc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .alloc-title { font-size: 12px; font-weight: 500; color: var(--text-main); }
    .alloc-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

    .alloc-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-sm);
    }

    .alloc-item-info { display: flex; flex-direction: column; gap: 2px; }
    .alloc-item-name { font-size: 13px; font-weight: 500; color: var(--text-main); }
    .alloc-item-loc { font-size: 11px; color: var(--text-muted); }
    
    .alloc-item-val {
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 500;
    }

    /* Projections */
    .projection-block {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .proj-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .proj-label { color: var(--text-muted); }
    .proj-val { font-family: var(--font-mono); font-weight: 500; color: var(--text-main); }
    .proj-val.success { color: var(--indicator-green); }

    .progress-track {
      height: 4px;
      background: var(--border-subtle);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--indicator-green);
      transition: width 0.4s var(--ease-out);
    }

    /* Footer Launch Area */
    .sidebar-footer {
      padding: 24px;
      background: var(--surface);
      border-top: 1px solid var(--border-subtle);
    }

    .btn-primary {
      width: 100%;
      padding: 12px;
      background: var(--accent-primary);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: all 0.2s var(--ease-out);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); box-shadow: var(--shadow-dropdown); }
    .btn-primary:disabled { background: var(--border-strong); color: var(--text-faint); cursor: not-allowed; }

    /* Empty States */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state svg { color: var(--text-faint); margin-bottom: 12px; }
    .empty-state h4 { font-size: 14px; font-weight: 500; color: var(--text-main); margin-bottom: 4px; }
    .empty-state p { font-size: 13px; line-height: 1.5; }

    /* Modal Overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s var(--ease-out);
    }
    .modal-overlay.active { opacity: 1; pointer-events: auto; }

    .modal-content {
      width: 440px;
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-modal);
      transform: scale(0.95) translateY(10px);
      transition: all 0.3s var(--ease-out);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }

    .modal-header {
      padding: 24px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .modal-title { font-size: 18px; font-weight: 600; color: var(--text-main); margin-bottom: 4px; }
    .modal-desc { font-size: 13px; color: var(--text-muted); }

    .modal-body {
      padding: 24px;
      background: var(--canvas);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .summary-card {
      background: var(--surface);
      padding: 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
    }
    .summary-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 500; margin-bottom: 8px;}
    .summary-value { font-family: var(--font-mono); font-size: 20px; font-weight: 500; color: var(--text-main); }

    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--border-subtle);
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      background: var(--surface);
    }

    .btn-secondary {
      padding: 10px 16px;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-secondary:hover { background: var(--surface-hover); }

    /* Loaders & Toasts */
    .skeleton {
      background: linear-gradient(90deg, var(--surface-hover) 25%, var(--border-subtle) 50%, var(--surface-hover) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 200;}
    .toast {
      padding: 12px 16px; background: var(--surface); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); box-shadow: var(--shadow-dropdown);
      font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px;
      animation: slideIn 0.3s var(--ease-out) forwards;
    }
    .toast.success { border-left: 3px solid var(--indicator-green); }
    .toast.error { border-left: 3px solid var(--text-main); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  </style>
</head>
<body>

  <div id="app-mount">
    </div>

  <div id="modal-mount">
    </div>
  
  <div class="toast-container" id="toast-mount"></div>

  <script>
    /**
     * Frontend Architecture
     * Domain: Outbound Infrastructure
     */

    // --- Configuration ---
    const CONFIG = {
      API_BASE: 'https://repaint-uninjured-probable.ngrok-free.dev',
      HEADERS: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
      DELIVERY_RATE: 0.942, // Baseline ML projection
    };

    // --- State Management ---
    class Store {
      constructor() {
        this.state = {
          status: 'initializing', // initializing, ready, error
          entities: [], // Schema: { id, city, state, tier, max_volume }
          metrics: null,
          allocations: new Map(), // Map<entityId, quantity>
          filters: { query: '', tier: 'all' },
          ui: { modalOpen: false, isLaunching: false }
        };
        this.listeners = [];
      }

      subscribe(listener) {
        this.listeners.push(listener);
      }

      dispatch(action, payload) {
        this._reduce(action, payload);
        this.listeners.forEach(fn => fn(this.state));
      }

      _reduce(action, payload) {
        switch (action) {
          case 'SET_STATUS': this.state.status = payload; break;
          case 'SET_ENTITIES': this.state.entities = payload; break;
          case 'SET_METRICS': this.state.metrics = payload; break;
          case 'SET_FILTER_QUERY': this.state.filters.query = payload; break;
          case 'SET_FILTER_TIER': this.state.filters.tier = payload; break;
          case 'ALLOCATE_ENTITY':
            const { id, quantity } = payload;
            const entity = this.state.entities.find(e => e.id === id);
            if (!entity) return;
            const safeQty = Math.max(0, Math.min(quantity, entity.max_volume));
            if (safeQty === 0) this.state.allocations.delete(id);
            else this.state.allocations.set(id, safeQty);
            break;
          case 'REMOVE_ALLOCATION':
            this.state.allocations.delete(payload);
            break;
          case 'CLEAR_ALLOCATIONS':
            this.state.allocations.clear();
            break;
          case 'TOGGLE_MODAL':
            this.state.ui.modalOpen = payload;
            break;
          case 'SET_LAUNCHING':
            this.state.ui.isLaunching = payload;
            break;
        }
      }

      // Selectors
      getFilteredEntities() {
        const { entities, filters } = this.state;
        const q = filters.query.toLowerCase();
        return entities.filter(e => {
          const matchQuery = e.city.toLowerCase().includes(q) || e.state.toLowerCase().includes(q);
          const matchTier = filters.tier === 'all' || e.tier === filters.tier;
          return matchQuery && matchTier;
        });
      }

      getCartTotal() {
        let total = 0;
        this.state.allocations.forEach(qty => total += qty);
        return total;
      }
      
      getProjections() {
        const total = this.getCartTotal();
        return {
          delivered: Math.round(total * CONFIG.DELIVERY_RATE),
          bounced: Math.round(total * (1 - CONFIG.DELIVERY_RATE)),
          replies: Math.round(total * 0.11)
        };
      }

      getOperationalInsights() {
        const ids = Array.from(this.state.allocations.keys());
        if (ids.length === 0) return [{ type: 'info', text: 'Select inventory segments to model delivery projections.' }];

        let total = 0;
        let selectedStates = new Set();
        ids.forEach(id => {
          const e = this.state.entities.find(x => x.id === id);
          if (e) { total += this.state.allocations.get(id); selectedStates.add(e.state); }
        });

        const insights = [];
        const hasFL = selectedStates.has('Florida') || selectedStates.has('FL');
        const hasTX = selectedStates.has('Texas') || selectedStates.has('TX');

        if (hasFL) insights.push({ type: 'positive', text: 'Florida target segments are outperforming the national benchmark by 4.2%.' });
        if (hasTX) insights.push({ type: 'info', text: 'Texas inventory remains highly stable with low historical bounce rates.' });
        
        if (total > 5000) insights.push({ type: 'warning', text: 'High volume selected. Automated staggering will be applied to protect domain reputation.' });
        else if (!hasFL && !hasTX) insights.push({ type: 'positive', text: `Projected delivery confidence remains optimal across selected target zones.` });

        return insights;
      }
    }

    const store = new Store();

    // --- Helpers ---
    const formatNumber = n => new Intl.NumberFormat('en-US').format(n);
    const generateId = (str) => 'ent_' + btoa(str).replace(/=/g, '').substring(0, 10).toLowerCase();

    // --- API Interactions ---
    async function initializeWorkspace() {

  store.dispatch('SET_STATUS', 'initializing');

  try {

    const [leadsRes, metricsRes] = await Promise.allSettled([

      fetch(
        `${CONFIG.API_BASE}/webhook-test/leads`,
        {
          method: 'GET',
          mode: 'cors',
          headers: CONFIG.HEADERS
        }
      ),

      fetch(
        `${CONFIG.API_BASE}/webhook-test/campaign-metrics`,
        {
          method: 'GET',
          mode: 'cors',
          headers: CONFIG.HEADERS
        }
      )

    ]);

    // Inventory
    if (leadsRes.status === 'fulfilled' && leadsRes.value.ok) {

      const data = await leadsRes.value.json();

      const mappedEntities = (data.inventory || []).map(item => ({

        id: generateId(
          `${item.city}-${item.state}-${item.school_level}`
        ),

        city: item.city,
        state: item.state,
        tier: item.school_level,
        max_volume: Number(item.available)

      }));

      store.dispatch('SET_ENTITIES', mappedEntities);

    } else {

      throw new Error('Primary inventory source unreachable.');

    }

    // Metrics
    if (metricsRes.status === 'fulfilled' && metricsRes.value.ok) {

      const metricsData = await metricsRes.value.json();

      store.dispatch(
        'SET_METRICS',
        metricsData.metrics?.[0] || {}
      );

    }

    store.dispatch('SET_STATUS', 'ready');

  } catch (err) {

    console.error(err);

    store.dispatch('SET_STATUS', 'error');

    showToast(
      'Infrastructure connection failed. Retrying.',
      'error'
    );

  }
}

    async function executeCampaign() {
      store.dispatch('SET_LAUNCHING', true);
      const payload = {
        action: 'LAUNCH_CAMPAIGN',
        cart: Array.from(store.state.allocations.entries()).map(([id, count]) => {
          const ent = store.state.entities.find(e => e.id === id);
          return { id, city: ent.city, state: ent.state, school_level: ent.tier, count };
        }),
        totalLeads: store.getCartTotal(),
        timestamp: new Date().toISOString()
      };

      try {
        const response = await fetch(`${CONFIG.API_BASE}/webhook-test/launch-campaign`, {
          method: 'POST',
          mode:"cors",
          headers: CONFIG.HEADERS,
          body: JSON.stringify(payload)
        });

        if (!response.ok) throw new Error('API Rejection');
        
        store.dispatch('TOGGLE_MODAL', false);
        store.dispatch('CLEAR_ALLOCATIONS');
        showToast('Campaign authorized and enqueued into infrastructure.', 'success');
        
        // Optimistic refresh
        initializeWorkspace();

      } catch (err) {
        store.dispatch('TOGGLE_MODAL', false);
        showToast('Failed to authorize campaign. Check infrastructure logs.', 'error');
      } finally {
        store.dispatch('SET_LAUNCHING', false);
      }
    }

    // --- UI Components & Rendering ---
    
    // Icons SVG Dictionary
    const Icons = {
      search: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>`,
      plus: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
      trash: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18"></path><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>`,
      zap: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>`,
      info: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>`,
      check: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`,
      alert: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`
    };

    function renderApp(state) {
      document.getElementById('app-mount').innerHTML = `
        <header class="topbar">
          <div class="topbar-brand">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            School Leads USA <span style="color: var(--text-faint)">/</span> Infrastructure
          </div>
          <div class="status-badge">
            <div class="status-dot"></div>
            Systems Operational
          </div>
        </header>

        <div class="workspace">
          <main class="datagrid-container">
            <div class="toolbar">
              <div class="search-input">
                ${Icons.search}
                <input type="text" id="search-input" placeholder="Query inventory segments..." value="${state.filters.query}">
              </div>
              <div class="segment-controls">
                ${['all', 'Elementary', 'Middle School', 'High School'].map(tier => `
                  <button class="segment-btn ${state.filters.tier === tier ? 'active' : ''}" data-action="filter-tier" data-tier="${tier}">
                    ${tier === 'all' ? 'All Segments' : tier.replace(' School', '')}
                  </button>
                `).join('')}
              </div>
            </div>
            
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th style="width: 40%">Target Segment</th>
                    <th style="width: 20%">Classification</th>
                    <th style="width: 20%">Available Volume</th>
                    <th style="width: 20%; text-align: right;">Action</th>
                  </tr>
                </thead>
                <tbody>
                  ${renderTableBody(state)}
                </tbody>
              </table>
            </div>
          </main>

          <aside class="sidebar">
            <div class="sidebar-header">
              <div class="sidebar-title">Campaign Builder</div>
              <div class="sidebar-subtitle">Operations Queue</div>
            </div>
            
            <div class="sidebar-content">
              ${renderSidebarContent(state)}
            </div>

            <div class="sidebar-footer">
              <button class="btn-primary" data-action="open-modal" ${store.getCartTotal() === 0 ? 'disabled' : ''}>
                ${Icons.zap} Initialize Campaign
              </button>
            </div>
          </aside>
        </div>
      `;
    }

    function renderTableBody(state) {
      if (state.status === 'initializing') {
        return Array(8).fill(0).map(() => `
          <tr>
            <td><div class="skeleton" style="height: 16px; width: 140px; margin-bottom: 6px;"></div><div class="skeleton" style="height: 12px; width: 80px;"></div></td>
            <td><div class="skeleton" style="height: 20px; width: 80px; border-radius: 12px;"></div></td>
            <td><div class="skeleton" style="height: 16px; width: 60px;"></div></td>
            <td></td>
          </tr>
        `).join('');
      }

      const entities = store.getFilteredEntities();
      if (entities.length === 0) {
        return `<tr><td colspan="4"><div class="empty-state">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <h4>No segments match query</h4>
          <p>Adjust your search parameters or classifications.</p>
        </div></td></tr>`;
      }

      return entities.map(e => {
        const allocated = state.allocations.get(e.id) || 0;
        const remaining = e.max_volume - allocated;
        
        return `
          <tr>
            <td>
              <div class="entity-primary">${e.city}</div>
              <div class="entity-secondary">${e.state}</div>
            </td>
            <td><span class="badge-tier">${e.tier}</span></td>
            <td><span class="data-mono ${remaining === 0 ? 'empty' : ''}">${formatNumber(remaining)}</span></td>
            <td class="action-cell">
              ${allocated > 0 ? `
                <div class="allocation-controls">
                  <input type="number" class="qty-input" data-id="${e.id}" value="${allocated}" min="0" max="${e.max_volume}">
                  <button class="btn-icon" data-action="remove-allocation" data-id="${e.id}">${Icons.trash}</button>
                </div>
              ` : `
                <button class="btn-allocate" data-action="add-allocation" data-id="${e.id}" data-vol="${Math.min(e.max_volume, 100)}">
                  + Allocate
                </button>
              `}
            </td>
          </tr>
        `;
      }).join('');
    }

    function renderSidebarContent(state) {
      const ids = Array.from(state.allocations.keys());
      const insights = store.getOperationalInsights();
      const total = store.getCartTotal();
      const proj = store.getProjections();

      if (ids.length === 0) {
        return `
          <div class="empty-state" style="padding: 20px 0;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            <h4>Awaiting Instructions</h4>
            <p style="margin-top:4px">Select entities from the inventory grid to construct your campaign architecture.</p>
          </div>
          ${renderIntelligenceBlock(insights)}
        `;
      }

      return `
        <div class="allocation-section">
          <div class="alloc-header">
            <span class="alloc-title">Target Entities</span>
            <span class="alloc-meta">${ids.length} selected</span>
          </div>
          <div style="display:flex; flex-direction:column; gap:8px;">
            ${ids.map(id => {
              const e = state.entities.find(x => x.id === id);
              const qty = state.allocations.get(id);
              return `
                <div class="alloc-item">
                  <div class="alloc-item-info">
                    <span class="alloc-item-name">${e.city}</span>
                    <span class="alloc-item-loc">${e.state} • ${e.tier}</span>
                  </div>
                  <span class="alloc-item-val">${formatNumber(qty)}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>

        <div class="projection-block">
          <div class="alloc-header" style="margin-bottom: 4px;">
            <span class="alloc-title">Delivery Projections</span>
          </div>
          <div class="proj-row">
            <span class="proj-label">Aggregate Volume</span>
            <span class="proj-val">${formatNumber(total)}</span>
          </div>
          <div class="proj-row">
            <span class="proj-label">Est. Delivered</span>
            <span class="proj-val success">${formatNumber(proj.delivered)}</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: ${(proj.delivered/total*100) || 0}%"></div>
          </div>
        </div>

        ${renderIntelligenceBlock(insights)}
      `;
    }

    function renderIntelligenceBlock(insights) {
      return `
        <div class="intelligence-card">
          <div class="intel-header">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 12h4l3-9 5 18 3-9h5"></path></svg>
            Operational Intelligence
          </div>
          <div class="intel-list">
            ${insights.map(i => {
              const iconMap = { positive: Icons.check, warning: Icons.alert, info: Icons.info };
              return `
                <div class="intel-item">
                  <span class="intel-icon ${i.type}">${iconMap[i.type]}</span>
                  <span>${i.text}</span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }

    function renderModal(state) {
      const el = document.getElementById('modal-mount');
      if (!state.ui.modalOpen) {
        el.innerHTML = `<div class="modal-overlay"></div>`;
        return;
      }

      const total = store.getCartTotal();
      const proj = store.getProjections();

      el.innerHTML = `
        <div class="modal-overlay active" id="modal-bg">
          <div class="modal-content">
            <div class="modal-header">
              <h3 class="modal-title">Authorize Campaign</h3>
              <p class="modal-desc">Review infrastructure allocation before execution.</p>
            </div>
            <div class="modal-body">
              <div class="summary-grid">
                <div class="summary-card">
                  <div class="summary-label">Total Volume</div>
                  <div class="summary-value">${formatNumber(total)}</div>
                </div>
                <div class="summary-card">
                  <div class="summary-label">Target Entities</div>
                  <div class="summary-value">${state.allocations.size}</div>
                </div>
                <div class="summary-card">
                  <div class="summary-label">Expected Delivery</div>
                  <div class="summary-value" style="color: var(--indicator-green)">${formatNumber(proj.delivered)}</div>
                </div>
                <div class="summary-card">
                  <div class="summary-label">ML Confidence</div>
                  <div class="summary-value">${(CONFIG.DELIVERY_RATE * 100).toFixed(1)}%</div>
                </div>
              </div>
            </div>
            <div class="modal-footer">
              <button class="btn-secondary" data-action="close-modal">Cancel</button>
              <button class="btn-primary" style="width: auto" data-action="execute-campaign" ${state.ui.isLaunching ? 'disabled' : ''}>
                ${state.ui.isLaunching ? 'Authorizing...' : 'Execute Launch'}
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function showToast(msg, type = 'success') {
      const container = document.getElementById('toast-mount');
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.innerHTML = `${type === 'success' ? Icons.check : Icons.alert} ${msg}`;
      container.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateY(10px)';
        el.style.transition = 'all 0.3s ease';
        setTimeout(() => el.remove(), 300);
      }, 4000);
    }

    // --- DOM Event Wiring ---
    function attachGlobalListeners() {
      // Event Delegation
      document.body.addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action]');
        if (!btn) {
          // Close modal on background click
          if (e.target.id === 'modal-bg') store.dispatch('TOGGLE_MODAL', false);
          return;
        }

        const action = btn.getAttribute('data-action');
        const id = btn.getAttribute('data-id');

        switch (action) {
          case 'filter-tier':
            store.dispatch('SET_FILTER_TIER', btn.getAttribute('data-tier'));
            break;
          case 'add-allocation':
            store.dispatch('ALLOCATE_ENTITY', { id, quantity: parseInt(btn.getAttribute('data-vol')) });
            break;
          case 'remove-allocation':
            store.dispatch('REMOVE_ALLOCATION', id);
            break;
          case 'open-modal':
            store.dispatch('TOGGLE_MODAL', true);
            break;
          case 'close-modal':
            store.dispatch('TOGGLE_MODAL', false);
            break;
          case 'execute-campaign':
            executeCampaign();
            break;
        }
      });

      // Input delegation (Search & Quantities)
      document.body.addEventListener('input', (e) => {
        if (e.target.id === 'search-input') {
          store.dispatch('SET_FILTER_QUERY', e.target.value);
        } else if (e.target.classList.contains('qty-input')) {
          const id = e.target.getAttribute('data-id');
          const val = parseInt(e.target.value) || 0;
          store.dispatch('ALLOCATE_ENTITY', { id, quantity: val });
        }
      });
      
      // Handle focus loss on qty inputs to clean up UI
      document.body.addEventListener('change', (e) => {
          if (e.target.classList.contains('qty-input')) {
              // Force render to clean up text formatting
              store.dispatch('ALLOCATE_ENTITY', { 
                  id: e.target.getAttribute('data-id'), 
                  quantity: parseInt(e.target.value) || 0 
              });
          }
      });
    }

    // --- Bootstrapping ---
    store.subscribe((state) => {
      // We re-render the whole app view. In a real app we'd use Virtual DOM, 
      // but this string interpolation is highly performant for this scale.
      // To preserve input focus during re-renders, we'd normally diff, 
      // but capturing the active element logic works for vanilla JS.
      const activeId = document.activeElement ? document.activeElement.id : null;
      const activeDataId = document.activeElement ? document.activeElement.getAttribute('data-id') : null;
      
      renderApp(state);
      renderModal(state);
      
      // Restore focus
      if (activeId) {
          const el = document.getElementById(activeId);
          if(el) {
              el.focus();
              if(el.setSelectionRange) el.setSelectionRange(el.value.length, el.value.length);
          }
      } else if (activeDataId) {
          const el = document.querySelector(`input[data-id="${activeDataId}"]`);
          if(el) el.focus();
      }
    });

    // Init
    attachGlobalListeners();
    renderApp(store.state);
    initializeWorkspace();

  </script>
</body>
</html>
